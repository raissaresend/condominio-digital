<!DOCTYPE html>
<html lang="pt-BR" layout:decorate="~{layout/layoutpadrao}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Mural de Avisos</title>
</head>
<body>
  <div layout:fragment="conteudo" th:fragment="conteudo" id="main" class="flex-1 overflow-x-hidden p-6 sm:p-10">
    <div class="flex items-center justify-between pb-6">
      <div>
        <h2 class="text-2xl font-semibold text-gray-700">Mural de Avisos</h2>
        <span class="text-xs text-gray-500">Listagem de recados e avisos para os moradores</span>
      </div>
      <div class="flex items-center justify-between" sec:authorize="hasAuthority('ROLE_PORTEIRO')">
        <a th:hx-get="@{/aviso/cadastrar}" hx-target="#main" hx-swap="outerHTML" hx-push-url="true" class="cursor-pointer rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
          Novo Aviso
        </a>
      </div>
    </div>

    <!-- Tabela de Avisos (Fragmento) -->
    <div id="tabelaAvisos" th:fragment="tabelaAvisos" class="overflow-x-auto rounded-lg shadow">
      <table class="min-w-full leading-normal">
        <thead>
          <tr>
            <th class="border-b-2 border-gray-200 bg-gray-100 px-5 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-600">
              Data de Publicação
            </th>
            <th class="border-b-2 border-gray-200 bg-gray-100 px-5 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-600">
              Título
            </th>
            <th class="border-b-2 border-gray-200 bg-gray-100 px-5 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-600">
              Conteúdo
            </th>
            <th sec:authorize="hasAuthority('ROLE_PORTEIRO')" class="border-b-2 border-gray-200 bg-gray-100 px-5 py-3 text-center text-xs font-semibold uppercase tracking-wider text-gray-600">
              Ações
            </th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="aviso : ${avisos}">
            <td class="border-b border-gray-200 bg-white px-5 py-5 text-sm">
              <p class="whitespace-nowrap text-gray-900 font-bold" th:text="${#temporals.format(aviso.dataPublicacao, 'dd/MM/yyyy HH:mm')}"></p>
            </td>
            <td class="border-b border-gray-200 bg-white px-5 py-5 text-sm">
              <p class="text-gray-900" th:text="${aviso.titulo}"></p>
            </td>
            <td class="border-b border-gray-200 bg-white px-5 py-5 text-sm">
              <p class="text-gray-600" th:text="${aviso.conteudo}"></p>
            </td>
            <td sec:authorize="hasAuthority('ROLE_PORTEIRO')" class="border-b border-gray-200 bg-white px-5 py-5 text-sm text-center">
              <div class="flex items-center justify-center gap-2">
                <button th:hx-get="@{/aviso/alterar/{codigo}(codigo=${aviso.codigo})}" hx-target="#main" hx-swap="outerHTML" hx-push-url="true" class="inline-flex items-center rounded bg-indigo-100 px-2.5 py-1.5 text-xs font-medium text-indigo-700 hover:bg-indigo-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">Editar</button>
                <button th:attr="hx-delete=@{/aviso/remover/{codigo}(codigo=${aviso.codigo})}" hx-target="#tabelaAvisos" hx-swap="outerHTML" hx-confirm="Tem certeza que deseja excluir este aviso?" class="inline-flex items-center rounded bg-red-100 px-2.5 py-1.5 text-xs font-medium text-red-700 hover:bg-red-200 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2">Excluir</button>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(avisos)}">
            <td colspan="4" class="border-b border-gray-200 bg-white px-5 py-5 text-sm text-center text-gray-500">
              Nenhum aviso publicado.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</body>
</html>
