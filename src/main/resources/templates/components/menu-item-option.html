<!-- Opcao -->
<div th:fragment="menu-item-option(texto, url, svg)" class="flex items-center hover:text-white"
    xmlns:th="http://www.thymeleaf.org">
    <!-- Imagem -->
    <svg th:replace="${svg}"></svg>
    <!-- Texto -->
    <a th:text="${texto}" th:hx-get="${url}" hx-target="#main" hx-push-url="true"
        class="cursor-pointer px-2 text-gray-400 hover:text-white">Cadastrar</a>
</div>
