<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Condomínio Digital</title>
  <link rel="stylesheet" type="text/css" th:href="@{/tailwind.css}" />
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}" />
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="w-full max-w-md">
    <div class="bg-white shadow-md rounded-lg px-8 pt-6 pb-8 mb-4">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Condomínio Digital</h2>
        <p class="text-gray-600 text-sm">Faça login para acessar o sistema</p>
      </div>

      <div th:if="${param.error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
        <span class="block sm:inline">Usuário ou senha inválidos.</span>
      </div>

      <div th:if="${param.logout}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-4" role="alert">
        <span class="block sm:inline">Logout realizado com sucesso.</span>
      </div>

      <form th:action="@{/login}" method="post">
        <!-- CSRF Token -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2" for="username">
            Usuário
          </label>
          <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500" id="username" name="username" type="text" placeholder="Digite seu usuário" required autofocus>
        </div>
        
        <div class="mb-6">
          <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
            Senha
          </label>
          <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500" id="password" name="password" type="password" placeholder="********" required>
        </div>
        
        <div class="flex items-center justify-between">
          <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" type="submit">
            Entrar
          </button>
        </div>
      </form>
    </div>
    
    <p class="text-center text-gray-500 text-xs">
      &copy;2024 Condomínio Digital. Todos os direitos reservados.
    </p>
  </div>

</body>
</html>
