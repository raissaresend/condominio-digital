<!DOCTYPE html>
<html lang="pt-BR" layout:decorate="~{layout/layoutpadrao}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Unidades</title>
</head>
<body>
  <div layout:fragment="conteudo" th:fragment="conteudo" id="main" class="flex-1 overflow-x-hidden p-6 sm:p-10">
    <div class="flex items-center justify-between pb-6">
      <div>
        <h2 class="text-2xl font-semibold text-gray-700">Unidades</h2>
        <span class="text-xs text-gray-500">Listagem de unidades do condomínio</span>
      </div>
      <div class="flex items-center justify-between">
        <a th:hx-get="@{/unidade/cadastrar}" hx-target="#main" hx-swap="outerHTML" hx-push-url="true" class="cursor-pointer rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
          Cadastrar Nova
        </a>
      </div>
    </div>

    <!-- Tabela de Unidades (Fragmento) -->
    <div id="tabelaUnidades" th:fragment="tabelaUnidades" class="overflow-x-auto rounded-lg shadow">
      <table class="min-w-full leading-normal">
        <thead>
          <tr>
            <th class="border-b-2 border-gray-200 bg-gray-100 px-5 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-600">
              Código
            </th>
            <th class="border-b-2 border-gray-200 bg-gray-100 px-5 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-600">
              Identificação (Ex: Bloco A - Apto 101)
            </th>
            <th class="border-b-2 border-gray-200 bg-gray-100 px-5 py-3 text-center text-xs font-semibold uppercase tracking-wider text-gray-600">
              Ações
            </th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="unidade : ${unidades}">
            <td class="border-b border-gray-200 bg-white px-5 py-5 text-sm">
              <p class="whitespace-nowrap text-gray-900" th:text="${unidade.codigo}"></p>
            </td>
            <td class="border-b border-gray-200 bg-white px-5 py-5 text-sm">
              <p class="whitespace-nowrap text-gray-900 font-bold" th:text="${unidade.identificacao}"></p>
            </td>
            <td class="border-b border-gray-200 bg-white px-5 py-5 text-sm text-center">
              <div class="flex items-center justify-center gap-2">
                <button th:hx-get="@{/unidade/alterar/{codigo}(codigo=${unidade.codigo})}" hx-target="#main" hx-swap="outerHTML" hx-push-url="true" class="inline-flex items-center rounded bg-indigo-100 px-2.5 py-1.5 text-xs font-medium text-indigo-700 hover:bg-indigo-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">Editar</button>
                <button th:attr="hx-delete=@{/unidade/remover/{codigo}(codigo=${unidade.codigo})}" hx-target="#tabelaUnidades" hx-swap="outerHTML" hx-confirm="Tem certeza que deseja excluir esta unidade?" class="inline-flex items-center rounded bg-red-100 px-2.5 py-1.5 text-xs font-medium text-red-700 hover:bg-red-200 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2">Excluir</button>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(unidades)}">
            <td colspan="3" class="border-b border-gray-200 bg-white px-5 py-5 text-sm text-center text-gray-500">
              Nenhuma unidade cadastrada.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</body>
</html>
