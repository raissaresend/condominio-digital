<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">


<div data-th-fragment="menu" class="space-y-4" th:fragment="menu" id="menu"
      hx-get="/layout/menu-atualizado" hx-trigger="atualizarAuth from:body" hx-target="this">

  <!-- 1o Item Menu -->
  <div x-data="{ open: false }" sec:authorize="hasAuthority('ROLE_PORTEIRO')">
    <button th:replace="~{components/menu-item-button :: menu-item-button('Unidades', ~{::#unidade-icon})}"></button>

    <div x-show="open" class="space-y-4 ps-10">
      <div th:replace="~{components/menu-item-option :: menu-item-option('Cadastrar', @{/unidade/cadastrar}, ~{::#cadastrar-icon})}"></div>
      <div th:replace="~{components/menu-item-option :: menu-item-option('Pesquisar', @{/unidade}, ~{::#pesquisar-icon})}"></div>
    </div>
  </div>

  <!-- 2o Item Menu -->
  <div x-data="{ open: false }" sec:authorize="hasAuthority('ROLE_PORTEIRO')">
    <button th:replace="~{components/menu-item-button :: menu-item-button('Transportadoras', ~{::#transportadora-icon})}"></button>

    <div x-show="open" class="space-y-4 ps-10">
      <div th:replace="~{components/menu-item-option :: menu-item-option('Cadastrar', @{/transportadora/cadastrar}, ~{::#cadastrar-icon})}"></div>
      <div th:replace="~{components/menu-item-option :: menu-item-option('Pesquisar', @{/transportadora}, ~{::#pesquisar-icon})}"></div>
    </div>
  </div>

  <!-- 3o Item Menu -->
  <div x-data="{ open: false }">
    <button th:replace="~{components/menu-item-button :: menu-item-button('Encomendas', ~{::#encomenda-icon})}"></button>

    <div x-show="open" class="space-y-4 ps-10">
      <div sec:authorize="hasAuthority('ROLE_PORTEIRO')" th:replace="~{components/menu-item-option :: menu-item-option('Cadastrar', @{/encomenda/cadastrar}, ~{::#cadastrar-icon})}"></div>
      <div th:replace="~{components/menu-item-option :: menu-item-option('Pesquisar', @{/encomenda}, ~{::#pesquisar-icon})}"></div>
    </div>
  </div>

  <!-- 4o Item Menu -->
  <div x-data="{ open: false }">
    <button th:replace="~{components/menu-item-button :: menu-item-button('Mural de Avisos', ~{::#aviso-icon})}"></button>

    <div x-show="open" class="space-y-4 ps-10">
      <div sec:authorize="hasAuthority('ROLE_PORTEIRO')" th:replace="~{components/menu-item-option :: menu-item-option('Cadastrar', @{/aviso/cadastrar}, ~{::#cadastrar-icon})}"></div>
      <div th:replace="~{components/menu-item-option :: menu-item-option('Pesquisar', @{/aviso}, ~{::#pesquisar-icon})}"></div>
    </div>
  </div>

  <!-- 5o Item Menu -->
  <div x-data="{ open: false }" sec:authorize="hasAuthority('ROLE_PORTEIRO')">
    <button th:replace="~{components/menu-item-button :: menu-item-button('Relatórios', ~{::#relatorios-icon})}"></button>

    <div x-show="open" class="space-y-4 ps-10">
      <div class="flex items-center hover:text-white">
        <svg th:replace="~{::#pdf-icon}"></svg>
        <a th:href="@{/relatorios/encomendas}" class="cursor-pointer px-2 text-gray-400 hover:text-white">Encomendas por Unidade</a>
      </div>
    </div>
  </div>

  <!-- 6o Item Menu -->
  <div x-data="{ open: false }" sec:authorize="hasAuthority('ROLE_PORTEIRO')">
    <button @click="open = !open"
      class="flex w-48 cursor-pointer items-center justify-between py-3 text-gray-400 hover:text-white focus:outline-none">
      <span class="flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-raised-hand" viewBox="0 0 16 16">
          <path d="M6 6.207v9.043a.75.75 0 0 0 1.5 0V10.5a.5.5 0 0 1 1 0v4.75a.75.75 0 0 0 1.5 0v-8.5a.25.25 0 1 1 .5 0v2.5a.75.75 0 0 0 1.5 0V6.5a3 3 0 0 0-3-3H6.236a1 1 0 0 1-.447-.106l-.33-.165A.83.83 0 0 1 5 2.488V.75a.75.75 0 0 0-1.5 0v2.083c0 .715.404 1.37 1.044 1.689L5.5 5c.32.32.5.754.5 1.207" />
          <path d="M8 3a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3" />
        </svg>
        <span class="ms-2">Usuários</span>
      </span>

      <span>
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path x-show="! open" d="M9 5L16 12L9 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none"></path>
          <path x-show="open" d="M19 9L12 16L5 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </span>
    </button>

    <div x-show="open" class="space-y-4 ps-10">
      <div class="flex items-center hover:text-white">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-archive-fill" viewBox="0 0 16 16">
          <path d="M12.643 15C13.979 15 15 13.845 15 12.5V5H1v7.5C1 13.845 2.021 15 3.357 15zM5.5 7h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1 0-1M.8 1a.8.8 0 0 0-.8.8V3a.8.8 0 0 0 .8.8h14.4A.8.8 0 0 0 16 3V1.8a.8.8 0 0 0-.8-.8z" />
        </svg>
        <a th:hx-get="@{/usuario/cadastrar}" hx-target="#main" hx-swap="outerHTML" hx-push-url="true" class="cursor-pointer px-2 text-gray-400 hover:text-white">Cadastrar</a>
      </div>
      <div class="flex items-center hover:text-white">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0" />
        </svg>
        <a th:hx-get="@{/usuario}" hx-target="#main" hx-swap="outerHTML" hx-push-url="true" class="cursor-pointer px-2 text-gray-400 hover:text-white">Pesquisar</a>
      </div>
    </div>
  </div>

</div>

<!-- Icons -->

</html>
