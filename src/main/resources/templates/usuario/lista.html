<!DOCTYPE html>
<html lang="pt-BR" layout:decorate="~{layout/layoutpadrao}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Usuários</title>
</head>
<body>
  <div layout:fragment="conteudo" th:fragment="conteudo" id="main" class="flex-1 overflow-x-hidden p-6 sm:p-10">
    <div class="flex items-center justify-between pb-6">
      <div>
        <h2 class="text-2xl font-semibold text-gray-700">Usuários</h2>
        <span class="text-xs text-gray-500">Listagem de usuários (Moradores e Porteiros)</span>
      </div>
      <div class="flex items-center justify-between">
        <a th:hx-get="@{/usuario/cadastrar}" hx-target="#main" hx-swap="outerHTML" hx-push-url="true" class="cursor-pointer rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
          Cadastrar Novo
        </a>
      </div>
    </div>

    <!-- Tabela de Usuários (Fragmento) -->
    <div id="tabelaUsuarios" th:fragment="tabelaUsuarios" class="overflow-x-auto rounded-lg shadow">
      <table class="min-w-full leading-normal">
        <thead>
          <tr>
            <th class="border-b-2 border-gray-200 bg-gray-100 px-5 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-600">
              Código
            </th>
            <th class="border-b-2 border-gray-200 bg-gray-100 px-5 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-600">
              Username
            </th>
            <th class="border-b-2 border-gray-200 bg-gray-100 px-5 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-600">
              Papel (Role)
            </th>
            <th class="border-b-2 border-gray-200 bg-gray-100 px-5 py-3 text-center text-xs font-semibold uppercase tracking-wider text-gray-600">
              Ações
            </th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="u : ${usuarios}">
            <td class="border-b border-gray-200 bg-white px-5 py-5 text-sm">
              <p class="whitespace-nowrap text-gray-900" th:text="${u.codigo}"></p>
            </td>
            <td class="border-b border-gray-200 bg-white px-5 py-5 text-sm">
              <p class="whitespace-nowrap text-gray-900 font-bold" th:text="${u.username}"></p>
            </td>
            <td class="border-b border-gray-200 bg-white px-5 py-5 text-sm">
              <span class="relative inline-block px-3 py-1 font-semibold text-gray-900 leading-tight">
                <span aria-hidden="true" class="absolute inset-0 rounded-full" th:classappend="${u.role == 'ROLE_PORTEIRO' ? 'bg-purple-200' : 'bg-green-200'}"></span>
                <span class="relative" th:text="${u.role == 'ROLE_PORTEIRO' ? 'Porteiro' : 'Morador'}"></span>
              </span>
            </td>
            <td class="border-b border-gray-200 bg-white px-5 py-5 text-sm text-center">
              <div class="flex items-center justify-center gap-2">
                <button th:hx-get="@{/usuario/alterar/{codigo}(codigo=${u.codigo})}" hx-target="#main" hx-swap="outerHTML" hx-push-url="true" class="inline-flex items-center rounded bg-indigo-100 px-2.5 py-1.5 text-xs font-medium text-indigo-700 hover:bg-indigo-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">Editar</button>
                <button th:attr="hx-delete=@{/usuario/remover/{codigo}(codigo=${u.codigo})}" hx-target="#tabelaUsuarios" hx-swap="outerHTML" hx-confirm="Tem certeza que deseja excluir este usuário?" class="inline-flex items-center rounded bg-red-100 px-2.5 py-1.5 text-xs font-medium text-red-700 hover:bg-red-200 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2">Excluir</button>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(usuarios)}">
            <td colspan="4" class="border-b border-gray-200 bg-white px-5 py-5 text-sm text-center text-gray-500">
              Nenhum usuário cadastrado.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</body>
</html>
